<template>
  <article class="eh-page">
    <section>
      <div class="slds-grid slds-gutters_x-small slds-wrap">
        <!-- invoiceNumber: задължително + pattern INV-XXXXX (от Rules) -->
        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
          <c-input-text
            label={_l.Wizard_lbl_complaint_invoice_number}
            name="invoiceNumber"
            value={data.invoiceNumber}
            onchange={changeHandler}
            pattern={_patterns.invoiceNumber}
            required={_required.invoiceNumber}
            read-only={_readOnly.invoiceNumber}
            error={_errors.invoiceNumber}
          ></c-input-text>
        </div>

        <!-- disputedAmount: незадължително; pageError ако = '0' (от Rules) -->
        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
          <c-input-text
            label={_l.Wizard_lbl_complaint_disputed_amount}
            name="disputedAmount"
            value={data.disputedAmount}
            onchange={changeHandler}
            read-only={_readOnly.disputedAmount}
            error={_errors.disputedAmount}
          ></c-input-text>
        </div>
      </div>
    </section>
    <!-- pageErrors се показват автоматично от главния wizard компонент чрез errors['$global'] -->
  </article>
</template>
